# Map for WebSocket upgrade (used by /socket.io/). Valid here: conf.d/*.conf
# is included inside the http {} context.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ----- HTTP (port 80): redirect everything to HTTPS -----
server {
    listen 80;
    server_name auctionshub.net;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS (port 443) -----
server {
    listen 443 ssl;
    http2 on;
    server_name auctionshub.net;

    # Cloudflare Origin Certificate (trusted by Cloudflare in Full strict mode,
    # 15-year validity → no renewals). Placed on the server only, never in git.
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Tell browsers to always use HTTPS for this host (1 year).
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Docker's embedded DNS. Combined with variable proxy_pass below, nginx
    # re-resolves upstream IPs at request time (valid=10s) instead of caching
    # them at startup — so recreating api/client on deploy no longer causes 502.
    resolver 127.0.0.11 valid=10s;

    # WebSocket / Socket.IO -> NestJS api. Browser hits /socket.io/ same-origin;
    # we upgrade and forward. NOTE: port is literal (nginx can't read env) —
    # keep in sync with API_PORT.
    location /socket.io/ {
        set $upstream_api api:3000;
        proxy_pass http://$upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1d;
    }

    # Everything else -> Next.js client (pages + /api BFF routes, which proxy
    # server-side to the api over the internal network).
    location / {
        set $upstream_client client:3001;
        proxy_pass http://$upstream_client$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
