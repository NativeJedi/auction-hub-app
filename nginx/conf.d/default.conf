# Map for WebSocket upgrade (used by /socket.io/). Valid here: conf.d/*.conf
# is included inside the http {} context.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ----- Phase 1: HTTP only (port 80) -----
# Serves the ACME challenge for Certbot and proxies the app over HTTP so the
# site is reachable while we obtain the certificate. The 443 server block is
# added in Phase 2 once the cert exists.
server {
    listen 80;
    server_name auctionshub.net;

    # Let's Encrypt HTTP-01 challenge (Certbot writes files into this webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # WebSocket / Socket.IO -> NestJS api. The browser hits /socket.io/ on the
    # same origin; we upgrade the connection and forward to the api container.
    # NOTE: port is literal (nginx can't read env). Keep in sync with API_PORT.
    location /socket.io/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1d;
    }

    # Everything else -> Next.js client (pages + the /api BFF routes, which
    # proxy server-side to the api over the internal network).
    location / {
        proxy_pass http://client:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
