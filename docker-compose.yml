name: auction-hub-prod

# Default logging: local JSON files with rotation, so container logs can never
# fill the disk (json-file keeps everything forever out of the box). Max
# 5 x 10MB per container. `docker logs <name>` works as usual.
# For CloudWatch shipping, layer docker-compose.cloudwatch.yml on top
# (see `npm run prod:cloudwatch`).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  redis:
    image: redis/redis-stack:latest
    container_name: auction-redis
    restart: unless-stopped
    logging: *default-logging
    # AOF persistence: every write is appended to disk, so sessions (and auction
    # state) survive a restart. Without it redis-stack only does periodic RDB
    # snapshots and recent writes are lost on restart.
    environment:
      REDIS_ARGS: "--appendonly yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2s
      retries: 10

  db:
    image: postgres:16
    container_name: auction-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      retries: 10

  api:
    # Prod pulls a prebuilt image from ECR (tag set by the deploy). The build:
    # block is kept as a local/offline fallback (`docker compose build api`).
    image: ${ECR_REGISTRY}/auction-hub-server:${IMAGE_TAG:-latest}
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: auction-api
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: ${API_PORT}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL}
      CLIENT_URL: ${CLIENT_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ROOM_MEMBER_INVITE_TOKEN_SECRET: ${JWT_ROOM_MEMBER_INVITE_TOKEN_SECRET}
      JWT_ROOM_MEMBER_TOKEN_SECRET: ${JWT_ROOM_MEMBER_TOKEN_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      # No STORAGE_ACCESS_KEY/SECRET_KEY: prod uses the EC2 instance IAM role.
      # (Passing them here as empty strings would fail Zod's .min(1) and crash boot.)
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_REGION: ${STORAGE_REGION}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      STORAGE_UPLOAD_URL: ${STORAGE_UPLOAD_URL}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_FROM: ${EMAIL_FROM}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    # No published ports: the api is reachable only on the internal network
    # (client and nginx reach it via api:${API_PORT}). Nothing direct from the host.
    expose:
      - "${API_PORT}"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${API_PORT}/api/v1/docs"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  client:
    # Prebuilt image from ECR. NEXT_PUBLIC_* are baked at build time in CI
    # (see deploy.yml); the build: block below is a local/offline fallback.
    image: ${ECR_REGISTRY}/auction-hub-client:${IMAGE_TAG:-latest}
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_APP_DOMAIN: ${NEXT_PUBLIC_APP_DOMAIN}
        NEXT_PUBLIC_WS_ORIGIN: ${NEXT_PUBLIC_WS_ORIGIN}
        # DSN is baked into the browser bundle at build time (it's public by design)
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    container_name: auction-client
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      API_URL: http://api:${API_PORT}/api/v1
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ROOM_MEMBER_INVITE_TOKEN_SECRET: ${JWT_ROOM_MEMBER_INVITE_TOKEN_SECRET}
      JWT_ROOM_MEMBER_TOKEN_SECRET: ${JWT_ROOM_MEMBER_TOKEN_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      NEXT_PUBLIC_APP_DOMAIN: ${NEXT_PUBLIC_APP_DOMAIN}
      NEXT_PUBLIC_WS_ORIGIN: ${NEXT_PUBLIC_WS_ORIGIN}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      # For the Next.js server runtime (RSC / route handlers)
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    # No published ports: reachable only via nginx (nginx -> client:3001).
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: auction-nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      client:
        condition: service_healthy

volumes:
  redis-data:
  pgdata:
