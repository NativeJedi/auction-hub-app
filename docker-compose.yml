name: auction-hub-prod

services:
  redis:
    image: redis/redis-stack:latest
    container_name: auction-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2s
      retries: 10

  db:
    image: postgres:16
    container_name: auction-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: auction-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL}
      CLIENT_URL: ${CLIENT_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ROOM_MEMBER_INVITE_TOKEN_SECRET: ${JWT_ROOM_MEMBER_INVITE_TOKEN_SECRET}
      JWT_ROOM_MEMBER_TOKEN_SECRET: ${JWT_ROOM_MEMBER_TOKEN_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      # No STORAGE_ACCESS_KEY/SECRET_KEY: prod uses the EC2 instance IAM role.
      # (Passing them here as empty strings would fail Zod's .min(1) and crash boot.)
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_REGION: ${STORAGE_REGION}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      STORAGE_UPLOAD_URL: ${STORAGE_UPLOAD_URL}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    # No published ports: the api is reachable only on the internal network
    # (client and nginx reach it via api:${API_PORT}). Nothing direct from the host.
    expose:
      - "${API_PORT}"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${API_PORT}/api/v1/docs"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_APP_DOMAIN: ${NEXT_PUBLIC_APP_DOMAIN}
        NEXT_PUBLIC_WS_ORIGIN: ${NEXT_PUBLIC_WS_ORIGIN}
    container_name: auction-client
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      API_URL: http://api:${API_PORT}/api/v1
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ROOM_MEMBER_INVITE_TOKEN_SECRET: ${JWT_ROOM_MEMBER_INVITE_TOKEN_SECRET}
      JWT_ROOM_MEMBER_TOKEN_SECRET: ${JWT_ROOM_MEMBER_TOKEN_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      NEXT_PUBLIC_APP_DOMAIN: ${NEXT_PUBLIC_APP_DOMAIN}
      NEXT_PUBLIC_WS_ORIGIN: ${NEXT_PUBLIC_WS_ORIGIN}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    # No published ports: reachable only via nginx (nginx -> client:3001).
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: auction-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    # Reload every 6h so renewed certs are picked up; nginx runs in foreground.
    command: /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
    depends_on:
      api:
        condition: service_healthy
      client:
        condition: service_healthy

  # Certbot: running container keeps certs renewed (checks every 12h).
  # Initial issuance is a one-off `docker compose run` command (see checklist).
  certbot:
    image: certbot/certbot
    container_name: auction-certbot
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'

volumes:
  redis-data:
  pgdata:
  certbot-www:
  certbot-conf:
